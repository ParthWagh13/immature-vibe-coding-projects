<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JEE Mains — Syllabus Tracker</title>
  <style>
    :root {
      --bg-deep: #0a0e14;
      --bg-card: #121820;
      --bg-elevated: #1a222d;
      --border: rgba(255, 255, 255, 0.06);
      --text: #e8ecf1;
      --text-muted: #8b98a8;
      --accent: #3dd6c3;
      --accent-dim: rgba(61, 214, 195, 0.15);
      --physics: #6eb5ff;
      --chemistry: #c792ea;
      --maths: #f78c6c;
      --radius: 14px;
      --shadow: 0 8px 32px rgba(0, 0, 0, 0.35);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: var(--bg-deep);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.5;
      background-image:
        radial-gradient(ellipse 120% 80% at 50% -20%, rgba(61, 214, 195, 0.12), transparent),
        radial-gradient(ellipse 80% 50% at 100% 50%, rgba(199, 146, 234, 0.06), transparent),
        radial-gradient(ellipse 60% 40% at 0% 80%, rgba(110, 181, 255, 0.08), transparent);
    }

    .wrap {
      max-width: 920px;
      margin: 0 auto;
      padding: 2rem 1.25rem 4rem;
    }

    header {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    header h1 {
      font-size: clamp(1.5rem, 4vw, 2rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 0.35rem;
    }

    header h1 span {
      color: var(--accent);
    }

    header p {
      color: var(--text-muted);
      font-size: 0.95rem;
      max-width: 36rem;
      margin: 0 auto;
    }

    .subject-tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      justify-content: center;
      margin-bottom: 1.75rem;
    }

    .subject-tabs button {
      font-family: inherit;
      font-size: 0.875rem;
      font-weight: 600;
      padding: 0.6rem 1.1rem;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--bg-card);
      color: var(--text-muted);
      cursor: pointer;
      transition: background 0.2s, color 0.2s, border-color 0.2s, transform 0.15s;
    }

    .subject-tabs button:hover {
      color: var(--text);
      border-color: rgba(255, 255, 255, 0.12);
    }

    .subject-tabs button.active {
      color: var(--bg-deep);
      border-color: transparent;
    }

    .subject-tabs button[data-subject="physics"].active {
      background: var(--physics);
    }

    .subject-tabs button[data-subject="chemistry"].active {
      background: var(--chemistry);
    }

    .subject-tabs button[data-subject="maths"].active {
      background: var(--maths);
    }

    .progress-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1rem;
      margin-bottom: 2rem;
    }

    .progress-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.1rem 1.25rem;
      box-shadow: var(--shadow);
    }

    .progress-card h3 {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      margin-bottom: 0.5rem;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    .progress-card h3 .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }

    .progress-card.physics h3 .dot { background: var(--physics); }
    .progress-card.chemistry h3 .dot { background: var(--chemistry); }
    .progress-card.maths h3 .dot { background: var(--maths); }

    .progress-bar-wrap {
      height: 10px;
      background: var(--bg-elevated);
      border-radius: 999px;
      overflow: hidden;
      margin-top: 0.65rem;
    }

    .progress-bar-fill {
      height: 100%;
      border-radius: 999px;
      transition: width 0.45s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .progress-card.physics .progress-bar-fill { background: linear-gradient(90deg, var(--physics), #8ec9ff); }
    .progress-card.chemistry .progress-bar-fill { background: linear-gradient(90deg, var(--chemistry), #e0b4ff); }
    .progress-card.maths .progress-bar-fill { background: linear-gradient(90deg, var(--maths), #ffb89a); }

    .progress-stats {
      font-family: ui-monospace, "Cascadia Code", "Segoe UI Mono", Consolas, monospace;
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-top: 0.45rem;
    }

    .progress-stats strong {
      color: var(--text);
      font-weight: 500;
    }

    .chapter-list {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: var(--shadow);
    }

    .chapter-list.hidden {
      display: none;
    }

    .chapter-row {
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 0.75rem 1rem;
      align-items: center;
      padding: 1rem 1.15rem;
      border-bottom: 1px solid var(--border);
      transition: background 0.15s;
    }

    .chapter-row:last-child {
      border-bottom: none;
    }

    .chapter-row:hover {
      background: rgba(255, 255, 255, 0.02);
    }

    .chapter-row label.checkbox-wrap {
      display: flex;
      align-items: center;
      cursor: pointer;
      min-width: 0;
    }

    .chapter-row input[type="checkbox"] {
      width: 1.15rem;
      height: 1.15rem;
      accent-color: var(--accent);
      cursor: pointer;
      flex-shrink: 0;
    }

    .chapter-title {
      font-size: 0.95rem;
      font-weight: 500;
      margin-left: 0.65rem;
      user-select: none;
    }

    .confidence-wrap {
      display: flex;
      flex-direction: column;
      gap: 0.2rem;
      min-width: 140px;
    }

    .confidence-wrap label.small {
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-muted);
    }

    .confidence-wrap select {
      font-family: inherit;
      font-size: 0.8rem;
      padding: 0.45rem 0.6rem;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--bg-elevated);
      color: var(--text);
      cursor: pointer;
      outline: none;
    }

    .confidence-wrap select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-dim);
    }

    .confidence-wrap select:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    footer {
      text-align: center;
      margin-top: 2.5rem;
      font-size: 0.8rem;
      color: var(--text-muted);
    }

    footer button {
      font-family: inherit;
      font-size: 0.8rem;
      margin-top: 0.75rem;
      padding: 0.45rem 0.9rem;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-muted);
      cursor: pointer;
    }

    footer button:hover {
      color: var(--text);
      border-color: rgba(255, 255, 255, 0.15);
    }

    @media (max-width: 600px) {
      .chapter-row {
        grid-template-columns: 1fr;
        gap: 0.65rem;
      }

      .confidence-wrap {
        min-width: 100%;
      }

      .chapter-row label.checkbox-wrap {
        align-items: flex-start;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>JEE Mains <span>Prep Tracker</span></h1>
      <p>
        Official NTA-style syllabus units. Mark chapters done and rate confidence — progress saves in your browser.
      </p>
    </header>

    <div class="subject-tabs" role="tablist" aria-label="Subject">
      <button type="button" class="active" data-subject="physics" role="tab" aria-selected="true">Physics</button>
      <button type="button" data-subject="chemistry" role="tab" aria-selected="false">Chemistry</button>
      <button type="button" data-subject="maths" role="tab" aria-selected="false">Mathematics</button>
    </div>

    <div class="progress-grid" id="progressGrid"></div>

    <div id="chapterPanels"></div>

    <footer>
      <p>Data stored locally (localStorage). Clearing site data will reset progress.</p>
      <button type="button" id="resetBtn">Reset all progress</button>
    </footer>
  </div>

  <script>
    /**
     * Chapters aligned with NTA JEE Main syllabus structure (Physics, Chemistry, Mathematics).
     * IDs are stable for localStorage keys.
     */
    const SYLLABUS = {
      physics: [
        "Physics and measurement",
        "Kinematics",
        "Laws of motion",
        "Work, energy and power",
        "Rotational motion",
        "Gravitation",
        "Properties of solids and liquids",
        "Thermodynamics",
        "Kinetic theory of gases",
        "Oscillations and waves",
        "Electrostatics",
        "Current electricity",
        "Magnetic effects of current and magnetism",
        "Electromagnetic induction and alternating currents",
        "Electromagnetic waves",
        "Optics",
        "Dual nature of matter and radiation",
        "Atoms and nuclei",
        "Electronic devices",
        "Experimental skills"
      ],
      chemistry: [
        "Some basic concepts in chemistry",
        "Atomic structure",
        "Chemical bonding and molecular structure",
        "Chemical thermodynamics",
        "Solutions",
        "Equilibrium",
        "Redox reactions and electrochemistry",
        "Chemical kinetics",
        "Surface chemistry",
        "Classification of elements and periodicity in properties",
        "Hydrogen",
        "s-Block elements (alkali and alkaline earth metals)",
        "p-Block elements — Groups 13 to 18",
        "d- and f-Block elements",
        "Coordination compounds",
        "Environmental chemistry",
        "Purification and characterization of organic compounds",
        "Some basic principles of organic chemistry",
        "Hydrocarbons",
        "Organic compounds containing halogens",
        "Organic compounds containing oxygen",
        "Organic compounds containing nitrogen",
        "Biomolecules",
        "Principles related to practical chemistry",
        "Chemistry in everyday life"
      ],
      maths: [
        "Sets, relations and functions",
        "Complex numbers and quadratic equations",
        "Matrices and determinants",
        "Permutations and combinations",
        "Mathematical induction",
        "Binomial theorem and its simple applications",
        "Sequence and series",
        "Limit, continuity and differentiability",
        "Integral calculus",
        "Differential equations",
        "Coordinate geometry",
        "Three dimensional geometry",
        "Vector algebra",
        "Statistics and probability",
        "Trigonometry",
        "Mathematical reasoning"
      ]
    };

    const STORAGE_KEY = "jeeMainsTrackerV1";

    const CONFIDENCE = {
      LOW: "low",
      MID: "mid",
      HIGH: "high"
    };

    const CONFIDENCE_LABELS = {
      [CONFIDENCE.LOW]: "Not confident",
      [CONFIDENCE.MID]: "Okay",
      [CONFIDENCE.HIGH]: "Confident"
    };

    function loadState() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return {};
        return JSON.parse(raw);
      } catch {
        return {};
      }
    }

    function saveState(state) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function chapterKey(subject, index) {
      return `${subject}:${index}`;
    }

    function getChapterEntry(state, subject, index) {
      const key = chapterKey(subject, index);
      return state[key] || { studied: false, confidence: CONFIDENCE.LOW };
    }

    function setChapter(state, subject, index, patch) {
      const key = chapterKey(subject, index);
      const prev = getChapterEntry(state, subject, index);
      state[key] = { ...prev, ...patch };
      saveState(state);
    }

    function countProgress(subject) {
      const chapters = SYLLABUS[subject];
      const total = chapters.length;
      let done = 0;
      for (let i = 0; i < total; i++) {
        if (getChapterEntry(state, subject, i).studied) done++;
      }
      return { done, total };
    }

    let state = loadState();

    function renderProgress() {
      const grid = document.getElementById("progressGrid");
      grid.innerHTML = ["physics", "chemistry", "maths"]
        .map((subj) => {
          const { done, total } = countProgress(subj);
          const pct = total ? Math.round((done / total) * 100) : 0;
          const label =
            subj === "physics" ? "Physics" : subj === "chemistry" ? "Chemistry" : "Mathematics";
          return `
            <div class="progress-card ${subj}">
              <h3><span class="dot"></span>${label}</h3>
              <div class="progress-bar-wrap" role="progressbar" aria-valuenow="${done}" aria-valuemin="0" aria-valuemax="${total}" aria-label="${label} completion">
                <div class="progress-bar-fill" style="width:${pct}%"></div>
              </div>
              <div class="progress-stats"><strong>${done}</strong> / ${total} chapters studied · <strong>${pct}%</strong></div>
            </div>
          `;
        })
        .join("");
    }

    function renderPanels() {
      const container = document.getElementById("chapterPanels");
      container.innerHTML = "";

      ["physics", "chemistry", "maths"].forEach((subject) => {
        const chapters = SYLLABUS[subject];
        const panel = document.createElement("div");
        panel.className = "chapter-list hidden";
        panel.dataset.subject = subject;
        panel.setAttribute("role", "tabpanel");
        panel.setAttribute("aria-hidden", "true");

        chapters.forEach((title, index) => {
          const entry = getChapterEntry(state, subject, index);
          const row = document.createElement("div");
          row.className = "chapter-row";

          const cbId = `cb-${subject}-${index}`;
          row.innerHTML = `
            <label class="checkbox-wrap" for="${cbId}">
              <input type="checkbox" id="${cbId}" data-subject="${subject}" data-index="${index}" ${entry.studied ? "checked" : ""} />
              <span class="chapter-title">${title}</span>
            </label>
            <div></div>
            <div class="confidence-wrap">
              <label class="small" for="conf-${subject}-${index}">Confidence</label>
              <select id="conf-${subject}-${index}" data-subject="${subject}" data-index="${index}" ${entry.studied ? "" : "disabled"}>
                ${Object.entries(CONFIDENCE_LABELS)
                  .map(
                    ([val, lab]) =>
                      `<option value="${val}" ${entry.confidence === val ? "selected" : ""}>${lab}</option>`
                  )
                  .join("")}
              </select>
            </div>
          `;

          const cb = row.querySelector('input[type="checkbox"]');
          const sel = row.querySelector("select");

          cb.addEventListener("change", () => {
            const studied = cb.checked;
            setChapter(state, subject, index, { studied });
            sel.disabled = !studied;
            if (!studied) {
              setChapter(state, subject, index, { confidence: CONFIDENCE.LOW });
              sel.value = CONFIDENCE.LOW;
            }
            renderProgress();
          });

          sel.addEventListener("change", () => {
            setChapter(state, subject, index, { confidence: sel.value });
          });

          panel.appendChild(row);
        });

        container.appendChild(panel);
      });

      showPanel(activeSubject);
    }

    let activeSubject = "physics";

    function showPanel(subject) {
      activeSubject = subject;
      document.querySelectorAll(".chapter-list").forEach((el) => {
        const isActive = el.dataset.subject === subject;
        el.classList.toggle("hidden", !isActive);
        el.setAttribute("aria-hidden", isActive ? "false" : "true");
      });
      document.querySelectorAll(".subject-tabs button").forEach((btn) => {
        const isActive = btn.dataset.subject === subject;
        btn.classList.toggle("active", isActive);
        btn.setAttribute("aria-selected", isActive ? "true" : "false");
      });
    }

    document.querySelectorAll(".subject-tabs button").forEach((btn) => {
      btn.addEventListener("click", () => showPanel(btn.dataset.subject));
    });

    document.getElementById("resetBtn").addEventListener("click", () => {
      if (confirm("Reset all chapters and confidence? This cannot be undone.")) {
        state = {};
        saveState(state);
        renderProgress();
        renderPanels();
      }
    });

    renderProgress();
    renderPanels();
  </script>
</body>
</html>
